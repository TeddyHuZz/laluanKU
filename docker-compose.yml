services:
  otp-engine:
    build:
      context: ./otp-engine
    ports:
      - "8080:8080"
    volumes:
      # Mount the graphs directory so that the graph.obj and config files can be loaded and modified dynamically
      - ./otp-engine/graphs:/app/graphs
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    depends_on:
      - otp-engine
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      # Mount source files for hot reloading in development
      - ./frontend:/app
      # Avoid overwriting container node_modules with host node_modules
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
